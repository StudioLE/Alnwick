name: CI/CD

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci-cd:
    name: CI/CD
    uses: StudioLE/Actions/.github/workflows/ci-cd-dioxus-fullstack.yml@v7
    with:
      package_name: alnwick
      binary_name: alnwick
      run_before: |
        mkdir -p "${HOME}/.cache/alnwick"
        mkdir -p "${HOME}/.local/share/alnwick"
        cargo test --release --color=always --no-fail-fast --target ${{ matrix.target }} scrape_command_simplecast
      docker_name: alnwick
      docker_path: docker/cli
    secrets:
      cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
